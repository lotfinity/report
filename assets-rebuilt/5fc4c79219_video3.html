  <title>Fullscreen Video with Close Button</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: black;
      height: 100%;
      overflow: hidden;
    }

    .video-wrapper {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100svh;
      background: black;
      z-index: 0;
    }

    .video-fullscreen {
      width: 100%;
      height: 100%;
      border: none;
    }

    .close-button {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 10;
      background: rgba(0, 0, 0, 0.6);
      color: white;
      border: none;
      font-size: 16px;
      padding: 10px 15px;
      border-radius: 5px;
      cursor: pointer;
    }

    .close-button:hover {
      background: red;
    }
  </style>

<!-- Кнопка закрытия -->
  <button class="close-button" onclick="window.history.back()">Close</button>

  <!-- Видеофрейм -->
  <div class="video-wrapper">
    <iframe
      class="video-fullscreen"
      src="https://www.youtube-nocookie.com/embed/8SosltzjL1Q?autoplay=1&muted=0&controls=1&fullscreen=1"
      allow="autoplay; fullscreen"
      allowfullscreen
    ></iframe>
  </div></div><script src="https://d3e54v103j8qbb.cloudfront.net/js/jquery-3.5.1.min.dc5e7f18c8.js?site=6824431ce2fd7f3c75768a2e" type="text/javascript" integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous"></script><script src="https://cdn.prod.website-files.com/6824431ce2fd7f3c75768a2e/js/webflow.schunk.36b8fb49256177c8.js" type="text/javascript" integrity="sha384-4abIlA5/v7XaW1HMXKBgnUuhnjBYJ/Z9C1OSg4OhmVw9O3QeHJ/qJqFBERCDPv7G" crossorigin="anonymous"></script><script src="https://cdn.prod.website-files.com/6824431ce2fd7f3c75768a2e/js/webflow.schunk.452e1cd124749014.js" type="text/javascript" integrity="sha384-4qBJ/blZKeCJLKpvK3TYOXKJzs9AdpfGJMjwjwndm3MApTNltyHPQbGxdQSjVTZt" crossorigin="anonymous"></script><script src="https://cdn.prod.website-files.com/6824431ce2fd7f3c75768a2e/js/webflow.a4c03adf.a5bbf5cdc65b5ecf.js" type="text/javascript" integrity="sha384-7xm6wlQixl3dm9IQ/D6E6SBH61mtN0kSv3yQeO5xh+q7dB9zGLpRN1RWWIAKpH1I" crossorigin="anonymous"></script><script src="https://cdn.prod.website-files.com/gsap/3.15.0/gsap.min.js" type="text/javascript"></script><script src="https://cdn.prod.website-files.com/gsap/3.15.0/ScrollTrigger.min.js" type="text/javascript"></script><script src="https://cdn.prod.website-files.com/gsap/3.15.0/SplitText.min.js" type="text/javascript"></script><script src="https://cdn.prod.website-files.com/gsap/3.15.0/CustomEase.min.js" type="text/javascript"></script><script type="text/javascript">gsap.registerPlugin(ScrollTrigger,SplitText,CustomEase);</script><script src="https://unpkg.com/lenis@1.1.13/dist/lenis.min.js"></script> 


<script>

const lenis = new Lenis({
  })

lenis.on('scroll', (e) => {
})

function raf(time) {
  lenis.raf(time)
  requestAnimationFrame(raf)
}

requestAnimationFrame(raf);

$("[data-lenis-start]").on("click", function () {
  lenis.start();
});
$("[data-lenis-stop]").on("click", function () {
  lenis.stop();
});
$("[data-lenis-toggle]").on("click", function () {
  $(this).toggleClass("stop-scroll");
  if ($(this).hasClass("stop-scroll")) {
    lenis.stop();
  } else {
    lenis.start();
  }
});
</script></body></html>
